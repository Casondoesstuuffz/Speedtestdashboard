<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Test Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 20px 0;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        .results {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .result {
            border: 1px solid #35424a;
            border-radius: 5px;
            background: #ffffff;
            margin: 15px;
            padding: 20px;
            flex: 1;
            min-width: 300px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Speed Test Dashboard</h1>
    </header>
    <div class="container">
        <div class="results">
            <div class="result">
                <h2>Download Speed</h2>
                <p id="download-speed">Loading...</p>
            </div>
            <div class="result">
                <h2>Upload Speed</h2>
                <p id="upload-speed">Loading...</p>
            </div>
            <div class="result">
                <h2>Latency</h2>
                <p id="latency">Loading...</p>
            </div>
        </div>
    </div>
    <script>
        function getSpeedTestResults() {
            // Simulate fetching results from a speed test
            document.getElementById('download-speed').innerText = '50 Mbps';
            document.getElementById('upload-speed').innerText = '10 Mbps';
            document.getElementById('latency').innerText = '20 ms';
        }
        window.onload = getSpeedTestResults;
    </script>
</body>
</html>
